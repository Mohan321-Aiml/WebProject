<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Smart Industrial Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>     
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 min-h-screen flex items-center justify-center">
    <div class="login-card max-w-md w-full p-8 rounded-3xl border border-white/10 shadow-2xl bg-slate-900 bg-opacity-80 backdrop-blur-xl">
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-white mb-2">Welcome Back</h1>
            <p class="text-slate-300">Login to access the AI Smart Industrial Monitoring Dashboard.</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-200 mb-2">Username</label>
                <input id="username" type="text" placeholder="Enter your username" class="w-full p-3 rounded-2xl border border-slate-700 bg-slate-950 text-white focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-slate-200 mb-2">Password</label>
                <input id="password" type="password" placeholder="Enter your password" class="w-full p-3 rounded-2xl border border-slate-700 bg-slate-950 text-white focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div id="loginError" class="text-sm text-red-400 min-h-[1.5rem]"></div>
            <button type="submit" class="w-full py-3 rounded-2xl bg-blue-600 text-white font-semibold hover:bg-blue-500 transition">Login</button>
        </form>

        <div class="mt-6 text-center text-sm text-slate-400">
            Use <span class="text-white font-semibold">admin</span> / <span class="text-white font-semibold">admin123</span>
        </div>
        <div class="mt-4 text-center text-slate-500 text-xs">
            Need help? Contact your system administrator.
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
